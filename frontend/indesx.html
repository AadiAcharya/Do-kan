<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokan Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f5f9;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* NAVBAR */

    .navbar{
      background:white;
      padding:15px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #ddd;
    }

    .logo{
      color:#2563eb;
      font-size:24px;
      font-weight:bold;
    }

    .nav-links a{
      text-decoration:none;
      margin-left:20px;
      color:#444;
      font-size:14px;
    }

    .login-nav{
      background:#2563eb;
      color:white !important;
      padding:8px 18px;
      border-radius:5px;
    }

    /* MAIN */

    .container{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .login-box{
      width:400px;
      background:white;
      padding:35px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .login-box h1{
      text-align:center;
      color:#2563eb;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:gray;
      font-size:13px;
      margin-bottom:25px;
    }

    .tabs{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
    }

    .tabs div{
      width:48%;
      text-align:center;
      padding-bottom:10px;
      border-bottom:2px solid #ddd;
      cursor:pointer;
    }

    .active{
      color:#2563eb;
      border-color:#2563eb !important;
      font-weight:bold;
    }

    label{
      display:block;
      margin-bottom:8px;
      margin-top:15px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    .forgot{
      text-align:right;
      margin-top:8px;
    }

    .forgot a{
      text-decoration:none;
      color:#2563eb;
      font-size:12px;
    }

    .btn{
      width:100%;
      background:#2563eb;
      color:white;
      border:none;
      padding:13px;
      border-radius:5px;
      margin-top:20px;
      cursor:pointer;
      font-size:15px;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .divider{
      text-align:center;
      margin:20px 0;
      color:gray;
      font-size:12px;
    }

    .social{
      display:flex;
      gap:10px;
    }

    .social button{
      flex:1;
      padding:10px;
      border:1px solid #ddd;
      background:white;
      cursor:pointer;
      border-radius:5px;
      font-size:16px;
    }

    .signup{
      text-align:center;
      margin-top:20px;
      font-size:13px;
    }

    .signup a{
      color:#2563eb;
      text-decoration:none;
    }

    /* FOOTER */

    footer{
      background:#ececf5;
      padding:20px;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      font-size:13px;
      color:#555;
    }

    .footer-links a{
      margin-left:15px;
      text-decoration:none;
      color:#555;
    }

    @media(max-width:500px){

      .navbar{
        flex-direction:column;
        gap:10px;
      }

      .login-box{
        width:100%;
      }

      footer{
        text-align:center;
        justify-content:center;
        gap:10px;
      }

    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">DOKAN</div>

    <div class="nav-links">
      <a href="#">Shop</a>
      <a href="#">Vendors</a>
      <a href="#">Categories</a>
      <a href="#">Deals</a>
      <a href="#">Sell</a>
      <a href="#" class="login-nav">Login</a>
    </div>

  </div>

  <!-- LOGIN SECTION -->

  <div class="container">

    <div class="login-box">

      <h1>DOKAN</h1>

      <p class="subtitle">
        Empowering Your Marketplace Journey
      </p>

      <div class="tabs">
        <div class="active">Login</div>
        <div>Sign Up</div>
      </div>

      <form>

        <label>Email Address</label>

        <input type="email" placeholder="name@company.com">

        <label>Password</label>

        <input type="password" placeholder="********">

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>

        <button class="btn">
          Login to Account
        </button>

      </form>

      <div class="divider">
        OR CONTINUE WITH
      </div>

      <div class="social">
        <button>G</button>
        <button>f</button>
        <button></button>
      </div>

      <div class="signup">
        Don’t have an account?
        <a href="#">Create an account</a>
      </div>

    </div>

  </div>

  <!-- FOOTER -->

  <footer>

    <div>
      <b>DOKAN</b><br>
      © 2026 DOKAN Marketplace
    </div>

    <div class="footer-links">
      <a href="#">About Us</a>
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
      <a href="#">Support</a>
    </div>

  </footer>

</body>
</html>
